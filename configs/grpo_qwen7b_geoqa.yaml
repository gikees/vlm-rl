# EasyR1 GRPO config for Qwen2.5-VL-7B on GeoQA
# Hardware: 2x RTX 4090 (48GB total)
# Usage: easyr1 train --config configs/grpo_qwen7b_geoqa.yaml

data:
  train_files: data/processed/verl/geoqa_train.parquet
  prompt_key: prompt
  image_key: images
  max_prompt_length: 512
  max_response_length: 1024
  max_pixels: 401408  # conservative for 24GB GPUs
  rollout_batch_size: 16
  train_batch_size: 4

algorithm:
  adv_estimator: grpo
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2

worker:
  actor:
    model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
    chat_template: auto
    optim:
      lr: 1.0e-6
      strategy: adamw_bf16
      warmup_ratio: 0.05
    fsdp:
      torch_dtype: bfloat16
    peft:
      peft_type: lora
      r: 16
      lora_alpha: 32
      lora_dropout: 0.05
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj

  rollout:
    name: vllm
    temperature: 1.0
    top_k: 0
    top_p: 1.0
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.85
    n: 4  # num generations per prompt

reward_model:
  custom_reward_function:
    path: src/rewards/outcome.py
    name: compute_score

trainer:
  total_epochs: 1
  test_freq: 50
  save_freq: 200
  nnodes: 1
  n_gpus_per_node: 2
  gradient_checkpointing: true

wandb:
  project: vlm-rl
  name: grpo-qwen7b-geoqa
